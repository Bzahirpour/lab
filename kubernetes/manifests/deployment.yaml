apiVersion: apps/v1 #different from repliction controller if wrong results in "no match for kind=replicaset"
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    tier: frontend
    app: nginx
spec:
  template:
    metadata:
      name: nginx-2
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx
  replicas: 3
  selector:
    matchLabels:
      app: nginx